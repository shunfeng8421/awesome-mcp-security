:"semgrep-rules-collection","relation":"belongs_to"},{"from":"semgrep-W4-access","to":"semgrep-rules-collection","relation":"belongs_to"},{"from":"semgrep-P7-sql","to":"semgrep-rules-collection","relation":"belongs_to"}]};

// Build node list — start in concentric circles near center
let idx=0;
Object.entries(data.nodes).forEach(([id,n])=>{
  let angle=(idx/Object.keys(data.nodes).length)*Math.PI*2;
  let radius=80+Math.floor(idx/15)*60;
  let x=CX+Math.cos(angle)*radius+(Math.random()-0.5)*40;
  let y=CY+Math.sin(angle)*radius+(Math.random()-0.5)*40;
  nodes.push({id,x,y,vx:0,vy:0,name:n.name||id,type:n.type||'unknown',fix:n.fix,cve:n.cve,conn:(n.connects_to||[]).length,visible:true});
  idx++;
});
data.edges.forEach(e=>{let s=nodes.find(n=>n.id===e.from),t=nodes.find(n=>n.id===e.to);if(s&&t)edges.push({s,t,r:e.relation,visible:true})});

document.getElementById('stats').innerHTML=`${nodes.length} 节点 · ${edges.length} 边 · 滚轮缩放 · 拖拽移动 · 搜索定位`;

function filterNodes(q){
  if(!q){nodes.forEach(n=>n.visible=true);edges.forEach(e=>e.visible=true);return}
  let ql=q.toLowerCase();
  let matched=new Set();
  nodes.forEach(n=>{if(n.name.toLowerCase().includes(ql)||n.id.toLowerCase().includes(ql)){matched.add(n.id)}});
  nodes.forEach(n=>{n.visible=matched.has(n.id)});
  edges.forEach(e=>{e.visible=nodes.some(n=>n.id===e.s.id&&n.visible)&&nodes.some(n=>n.id===e.t.id&&n.visible)});
  if(matched.size===1){let n=nodes.find(x=>x.id===Array.from(matched)[0]);if(n){offsetX=CX-n.x;offsetY=CY-n.y;scale=1.5}}
}

function resetView(){offsetX=0;offsetY=0;scale=1;showAllLabels=!showAllLabels}

function simulate(){
  const dt=0.2, rep=800, spring=0.005, damp=0.9, grav=0.02;
  for(let n of nodes){
    if(!n.visible||n===dragNode) continue;
    let fx=(CX-n.x)*grav, fy=(CY-n.y)*grav; // gentle center gravity
    for(let m of nodes){
      if(n===m||!m.visible) continue;
      let dx=n.x-m.x, dy=n.y-m.y, d=Math.max(dx*dx+dy*dy,400);
      fx+=dx/d*rep; fy+=dy/d*rep;
    }
    for(let e of edges){
      if(!e.visible) continue;
      if(e.s===n||e.t===n){
        let t=e.s===n?e.t:e.s;
        if(!t.visible) continue;
        let dx=t.x-n.x, dy=t.y-n.y, d=Math.sqrt(dx*dx+dy*dy)||1;
        let f=(d-130)*spring;
        fx+=dx/d*f; fy+=dy/d*f;
      }
    }
    n.vx=(n.vx+fx*dt)*damp; n.vy=(n.vy+fy*dt)*damp;
    n.x+=n.vx*dt; n.y+=n.vy*dt;
  }
}

function draw(){
  ctx.fillStyle='#0d1117';ctx.fillRect(0,0,c.width,c.height);
  ctx.save();
  ctx.translate(offsetX,offsetY);ctx.scale(scale,scale);

  for(let e of edges){
    if(!e.visible) continue;
    let hl=hoverNode&&(hoverNode===e.s||hoverNode===e.t)||selectedNode&&(selectedNode===e.s||selectedNode===e.t);
    ctx.strokeStyle=hl?'#58a6ff':'#21262d';ctx.lineWidth=hl?2:0.5;
    ctx.beginPath();ctx.moveTo(e.s.x,e.s.y);ctx.lineTo(e.t.x,e.t.y);ctx.stroke();
    if(hl&&(hoverNode||selectedNode)){
      let mx=(e.s.x+e.t.x)/2,my=(e.s.y+e.t.y)/2;
      ctx.fillStyle='#8b949e';ctx.font='8px sans-serif';
      ctx.fillText(e.r,mx+4,my-2);
    }
  }
  for(let n of nodes){
    if(!n.visible) continue;
    let r=SIZES[n.type]||7;
    ctx.fillStyle=COLORS[n.type]||'#888';ctx.beginPath();
    ctx.arc(n.x,n.y,r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#ffffff44';ctx.lineWidth=0.5;ctx.stroke();

    // Draw label
    let showLabel=showAllLabels||hoverNode===n||selectedNode===n||n.conn>5;
    if(showLabel){
      ctx.fillStyle=selectedNode===n?'#58a6ff':hoverNode===n?'#f0f6fc':'#8b949e66';
      ctx.font=`${hoverNode===n||selectedNode===n?'bold ':''}${10/scale}px sans-serif`;
      ctx.fillText(n.name,n.x+r+3,n.y+4);
    }
  }
  ctx.restore();
}

c.addEventListener('wheel',e=>{e.preventDefault();scale*=e.deltaY<0?1.05:0.95;scale=Math.max(0.1,Math.min(3,scale))});
c.addEventListener('mousemove',e=>{
  let mx=(e.offsetX-offsetX)/scale, my=(e.offsetY-offsetY)/scale;
  if(dragNode){dragNode.x=mx;dragNode.y=my;return}
  hoverNode=null;
  for(let n of nodes){if(!n.visible) continue;let dx=n.x-mx,dy=n.y-my;if(dx*dx+dy*dy<SIZES[n.type]*SIZES[n.type]*2){hoverNode=n;break}}
  c.style.cursor=hoverNode?'pointer':'default';
});
c.addEventListener('mousedown',e=>{
  let mx=(e.offsetX-offsetX)/scale, my=(e.offsetY-offsetY)/scale;
  for(let n of nodes){if(!n.visible) continue;let dx=n.x-mx,dy=n.y-my;if(dx*dx+dy*dy<SIZES[n.type]*SIZES[n.type]*2){dragNode=n;selectedNode=n;showInfo(n);return}}
  dragNode=null;selectedNode=null;document.getElementById('info').style.display='none';
});
c.addEventListener('mouseup',()=>{dragNode=null});
c.addEventListener('mouseleave',()=>{hoverNode=null});

function showInfo(n){
  let info=document.getElementById('info'),ic=document.getElementById('infoContent');
  let conns=nodes.filter(m=>edges.some(e=>(e.s===n&&e.t===m)||(e.t===n&&e.s===m)));
  ic.innerHTML=`<h3>${n.name}</h3><p>类型: ${n.type} | 关联: ${n.conn} 节点</p>${n.fix?`<p class="fix">🔧 ${n.fix}</p>`:''}${n.cve?`<p>📌 CVE: ${n.cve}</p>`:''}${conns.length?`<p>连接: ${conns.slice(0,10).map(x=>x.name).join(', ')}</p>`:''}`;
  info.style.display='block';
}

setInterval(()=>{simulate();draw()},16);
</script>
